<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emuladores</title>
  <link rel="stylesheet" href="style/style.css">
</head>
<body>
  <main class="content-page">
    <header class="page-header">
      <div>
        <h1>Emuladores</h1>
        <p class="page-intro">⚠ Enlaces a páginas oficiales ⚠</p>
      </div>
      <div class="button-row">
        <a class="button" href="index.html">Volver</a>
      </div>
    </header>

    <section class="grid-list">
      <article class="item-card">
        <img src="Imagenes/wii.png" alt="Dolphin Wii">
        <div class="item-info">
          <h2>Dolphin (GameCube/Wii)</h2>
          <a class="button" href="https://es.dolphin-emu.org/?cr=es">Descargar</a>
        </div>
      </article>

      <article class="item-card">
        <img src="Imagenes/ppsspp-logo.png" alt="PPSSPP">
        <div class="item-info">
          <h2>PPSSPP (PlayStation Portable)</h2>
          <a class="button" href="https://www.ppsspp.org/">Descargar</a>
        </div>
      </article>

      <article class="item-card">
        <img src="Imagenes/ps2emu.png" alt="PCSX2">
        <div class="item-info">
          <h2>PCSX2 (PlayStation 2)</h2>
          <div class="button-row wrap">
            <a class="button" href="https://pcsx2.net/">Descargar</a>
            <a class="button" href="https://ps2biosonline.com/">Descargar Bios PS2</a>
          </div>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
